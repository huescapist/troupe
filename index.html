<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Труппа // Главный Хаб</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-main: #0c0f12;
            --panel-bg: rgba(16, 21, 26, 0.8);
            --panel-border: rgba(255, 255, 255, 0.05);
            --accent-glow: rgba(0, 240, 255, 0.25);
            --accent-cyan: #a6efff; 
            --accent-magenta: #ea315a; 
            --accent-violet: #4a3b68; 
            --text-primary: #e2e8f0;
            --text-muted: #718096;
            --text-dark: #4a5568;
            --font: 'Perpetua', 'Georgia', serif;
        }

        body {
            font-family: var(--font), sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            position: relative;
        }

        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 30%, #161c24 0%, #0c0f12 80%);
        }

        .fog {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(166, 239, 255, 0.03) 0%, transparent 40%),
                        radial-gradient(circle at 70% 80%, rgba(234, 49, 90, 0.02) 0%, transparent 40%);
            opacity: 0.7;
            animation: fogMove 40s linear infinite;
        }

        .particles {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(166, 239, 255, 0.3);
            box-shadow: 0 0 10px rgba(166, 239, 255, 0.6);
            animation: floatUp 12s infinite linear;
            bottom: -20px;
        }

        .p1 { left: 10%; width: 4px; height: 4px; animation-duration: 14s; animation-delay: 1s; }
        .p2 { left: 30%; width: 6px; height: 6px; animation-duration: 18s; animation-delay: 5s; background: rgba(234, 49, 90, 0.2); box-shadow: 0 0 10px rgba(234, 49, 90, 0.5); }
        .p3 { left: 55%; width: 3px; height: 3px; animation-duration: 12s; animation-delay: 0s; }
        .p4 { left: 75%; width: 5px; height: 5px; animation-duration: 16s; animation-delay: 3s; }
        .p5 { left: 90%; width: 4px; height: 4px; animation-duration: 20s; animation-delay: 7s; }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            padding: 50px 20px;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: 1fr;
            gap: 35px;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 900px) {
            .wrapper { grid-template-columns: 450px 1fr; }
            header, .accordion-section, footer { grid-column: 1 / -1; }
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 25px;
        }

        @media (min-width: 480px) {
            header { flex-direction: row; align-items: center; justify-content: space-between; }
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 30%, #a6efff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(166,239,255,0.2);
        }

        .status-badge {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(234, 49, 90, 0.1);
            color: var(--accent-magenta);
            padding: 6px 14px;
            border-radius: 4px;
            border: 1px solid rgba(234, 49, 90, 0.2);
            font-weight: 700;
            width: fit-content;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .panel h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: normal;
            text-shadow: 0 0 10px rgba(166, 239, 255, 0.3);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="time"],
        .form-group textarea {
            width: 100%; padding: 12px 14px; background: rgba(7, 9, 12, 0.8); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 6px;
            color: var(--text-primary); font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: all 0.25s ease;
        }
        
        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-group input:focus, .form-group textarea:focus { 
            outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(166, 239, 255, 0.15); background: rgba(7, 9, 12, 0.95); 
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .file-upload-input {
            width: 100%; padding: 12px; background: rgba(7, 9, 12, 0.6); border: 1px dashed rgba(255,255,255,0.15); border-radius: 6px;
            color: var(--text-muted); font-size: 0.9rem; cursor: pointer; text-align: center; box-sizing: border-box;
        }
        .file-upload-input:hover { border-color: var(--accent-cyan); color: var(--text-primary); }

        button.btn-submit {
            width: 100%; padding: 16px; background: linear-gradient(180deg, #2c323d, #1a1e26); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff; border-radius: 6px; font-family: inherit; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
        }
        button.btn-submit:hover { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(166, 239, 255, 0.2); background: linear-gradient(180deg, #373e4c, #20252f); }

        .meetups-grid { display: flex; flex-direction: column; gap: 20px; }
        .meetup-card {
            background: rgba(12, 15, 18, 0.85); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 10px; padding: 25px;
            display: flex; flex-direction: column; gap: 15px; transition: all 0.25s ease; animation: fadeIn 0.35s ease-out; position: relative;
        }
        .meetup-card:hover { border-color: rgba(166, 239, 255, 0.2); background: rgba(16, 21, 26, 0.9); }
        
        .meetup-header-line { display: flex; justify-content: space-between; align-items: flex-start; gap: 15px; }
        .card-main-info { display: flex; flex-direction: column; gap: 6px; }
        .card-datetime { font-size: 1.4rem; color: var(--text-primary); font-weight: normal; }
        .card-badges { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
        .badge-date { font-size: 0.75rem; background: rgba(255, 255, 255, 0.04); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; }
        .badge-org { font-size: 0.85rem; color: var(--accent-cyan); background: rgba(166, 239, 255, 0.05); padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(166, 239, 255, 0.1); }
        
        .card-details-block {
            display: flex; flex-direction: column; gap: 8px; font-size: 0.95rem; color: #cbd5e0; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 12px;
        }
        .detail-item strong { color: var(--text-muted); text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 2px; letter-spacing: 0.5px; }
        
        .meetup-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); margin-top: 8px; }

        button.delete-btn {
            background: transparent; border: 1px solid rgba(234, 49, 90, 0.2); color: var(--accent-magenta); padding: 8px 14px; border-radius: 4px;
            cursor: pointer; font-family: inherit; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
        }
        button.delete-btn:hover { background: var(--accent-magenta); color: #fff; box-shadow: 0 0 12px rgba(234, 49, 90, 0.4); }

        .no-meetups { border: 1px dashed rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 45px; text-align: center; color: var(--text-muted); font-size: 0.95rem; }

        .accordion-section { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .accordion-item { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 8px; overflow: hidden; }
        .accordion-trigger {
            width: 100%; background: transparent; border: none; padding: 20px 25px; text-align: left; color: var(--text-primary);
            font-family: inherit; font-size: 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px;
        }
        .accordion-trigger::after { content: '＋'; font-size: 1.1rem; color: var(--text-muted); transition: transform 0.25s; }
        .accordion-item.active .accordion-trigger::after { transform: rotate(45deg); color: var(--accent-magenta); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0, 1, 0, 1); background: rgba(7, 9, 12, 0.5); }
        .accordion-item.active .accordion-content { max-height: 2000px; transition: max-height 0.3s cubic-bezier(1, 0, 1, 0); border-top: 1px solid rgba(255, 255, 255, 0.02); }
        .accordion-body { padding: 25px; font-size: 0.95rem; line-height: 1.6; color: #cbd5e0; white-space: pre-wrap; }

        footer { border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 30px; margin-top: 20px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .footer-link-card {
            background: rgba(7,
